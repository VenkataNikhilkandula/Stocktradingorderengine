# =========================================================
# APPLICATION
# =========================================================

spring.application.name=TradingEngineSystem

server.port=8080

# =========================================================
# DATABASE CONFIGURATION
# =========================================================

spring.datasource.url=jdbc:mysql://localhost:3306/trading_engine_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================================================
# JPA / HIBERNATE
# =========================================================

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jpa.open-in-view=false

# =========================================================
# HIBERNATE PERFORMANCE
# =========================================================

spring.jpa.properties.hibernate.jdbc.batch_size=50

spring.jpa.properties.hibernate.order_inserts=true

spring.jpa.properties.hibernate.order_updates=true

spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# =========================================================
# CONNECTION POOL (HIKARI CP)
# =========================================================

spring.datasource.hikari.pool-name=TradingEngineHikariCP

spring.datasource.hikari.minimum-idle=5

spring.datasource.hikari.maximum-pool-size=20

spring.datasource.hikari.idle-timeout=30000

spring.datasource.hikari.max-lifetime=1800000

spring.datasource.hikari.connection-timeout=30000

# =========================================================
# LOGGING
# =========================================================

logging.level.root=INFO

logging.level.com.tradingengine=DEBUG

logging.level.org.springframework.web=INFO

logging.level.org.hibernate.SQL=DEBUG

logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

logging.file.name=logs/trading-engine.log

# =========================================================
# SWAGGER / OPENAPI
# =========================================================

springdoc.api-docs.enabled=true

springdoc.swagger-ui.enabled=true

springdoc.swagger-ui.path=/swagger-ui.html

springdoc.api-docs.path=/v3/api-docs

# =========================================================
# JACKSON
# =========================================================

spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false

spring.jackson.default-property-inclusion=non_null

spring.jackson.time-zone=UTC

# =========================================================
# ASYNC CONFIG
# =========================================================

spring.task.execution.pool.core-size=10

spring.task.execution.pool.max-size=20

spring.task.execution.pool.queue-capacity=100

spring.task.execution.thread-name-prefix=TradingEngine-

# =========================================================
# CACHE CONFIG
# =========================================================

spring.cache.type=simple

# =========================================================
# ACTUATOR
# =========================================================

management.endpoints.web.exposure.include=*

management.endpoint.health.show-details=always

management.info.env.enabled=true

# =========================================================
# SECURITY (JWT)
# =========================================================

jwt.secret=ThisIsVerySecureSecretKeyForTradingEngineApplication123456

jwt.expiration=86400000

# =========================================================
# TRADING ENGINE CONFIG
# =========================================================

trading.engine.max-order-book-size=100000

trading.engine.matching-thread-pool-size=10

trading.engine.trade-batch-size=100

# =========================================================
# MARKET CONFIG
# =========================================================

market.open-time=09:15

market.close-time=15:30

market.timezone=Asia/Kolkata

# =========================================================
# DEVTOOLS (OPTIONAL)
# =========================================================

spring.devtools.restart.enabled=true

spring.devtools.livereload.enabled=true

# =========================================================
# H2 CONSOLE (OPTIONAL FOR TESTING)
# =========================================================

spring.h2.console.enabled=false

# =========================================================
# SQL INITIALIZATION
# =========================================================

spring.sql.init.mode=always

# =========================================================
# BANNER
# =========================================================

spring.main.banner-mode=console

# =========================================================
# FILE UPLOAD
# =========================================================

spring.servlet.multipart.max-file-size=10MB

spring.servlet.multipart.max-request-size=10MB

# =========================================================
# GRACEFUL SHUTDOWN
# =========================================================

server.shutdown=graceful

spring.lifecycle.timeout-per-shutdown-phase=30s